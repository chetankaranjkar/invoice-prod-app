server {
    listen 80;
    server_name invoiceapp.local localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Allow large file uploads/downloads for backup operations (up to 1GB)
    client_max_body_size 1024M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Proxy for static file uploads (logos/signatures) - MUST come before catch-all location /
    # Forward /uploads/ requests to API, preserving the full path.
    # `^~` makes this prefix win over the static-asset regex location below, otherwise
    # requests like /uploads/logos/x.png match that regex and 404 from the local html root.
    location ^~ /uploads/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        # Disable buffering for better performance with images
        proxy_buffering off;
    }

  # API proxy - forward API requests to backend
  location /api/ {
    client_max_body_size 1024M;
    proxy_pass http://api:8080/api/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 600s;
    proxy_connect_timeout 75s;
    proxy_send_timeout 600s;
    proxy_request_buffering off;
    proxy_max_temp_file_size 1024m;
  }

    # Cache static assets from frontend build
    # Note: /uploads/ location block above takes precedence for /uploads/ paths
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Handle React Router (SPA) - catch-all must come last
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

